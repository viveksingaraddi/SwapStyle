<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="200" rx="40" fill="white"></rect>

  <!-- Top Arrow -->
  <path d="M50 60 A60 60 0 0 1 150 60" stroke="#16a34a" stroke-width="8" fill="none" marker-end="url(#arrowGreen)"></path>

  <!-- Bottom Arrow -->
  <path d="M150 140 A60 60 0 0 1 50 140" stroke="#1f2937" stroke-width="8" fill="none" marker-end="url(#arrowDark)"></path>

  <!-- Left Hanger -->
  <path d="M40 100 Q50 80 70 100 L90 120 H30 Z" stroke="#16a34a" stroke-width="4" fill="none"></path>

  <!-- Right Hanger -->
  <path d="M160 100 Q150 80 130 100 L110 120 H170 Z" stroke="#1f2937" stroke-width="4" fill="none"></path>

  <!-- Text SS -->
  <text x="100" y="115" font-size="40" font-weight="bold" text-anchor="middle">
    <tspan fill="#16a34a">S</tspan>
    <tspan fill="#1f2937">S</tspan>
  </text>

  <!-- Arrow Markers -->
  <defs>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <polygon points="0,0 10,5 0,10" fill="#16a34a"></polygon>
    </marker>
    <marker id="arrowDark" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <polygon points="0,0 10,5 0,10" fill="#1f2937"></polygon>
    </marker>
  </defs>
</svg>